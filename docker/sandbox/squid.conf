# --- Squid egress allow-list ------------------------------------------------
# We do NOT decrypt TLS. For HTTPS the client sends `CONNECT host:443`, so we
# filter on the hostname in the CONNECT request via the dstdomain ACL below.

# Who is allowed to use the proxy at all: only the internal sandbox network.
acl localnet src 172.16.0.0/12
acl localnet src 10.0.0.0/8
acl localnet src 192.168.0.0/16

# Allowed destination hostnames (exact match, no leading dot).
acl allowed_domains dstdomain "/etc/squid/allowed_domains.txt"

# Only permit CONNECT to 443 (HTTPS) and normal http on 80.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# The actual policy: allowed domains from the sandbox net only, deny the rest.
http_access allow localnet allowed_domains
http_access deny all

http_port 3128

# Don't leak a cache or identifying headers; keep it lean.
cache deny all
forwarded_for delete
via off
httpd_suppress_version_string on

# Log decisions so you can audit what Claude tried to reach.
logfile_rotate 0
access_log stdio:/dev/stdout squid
cache_log /dev/stderr
