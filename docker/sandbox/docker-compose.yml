services:
  # --------------------------------------------------------------------------
  # Egress proxy: the ONLY container with real internet access.
  # Squid allows CONNECT only to the allow-listed domains; everything else 403.
  # --------------------------------------------------------------------------
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: claude-proxy
    restart: unless-stopped
    # Run squid as the non-root 'proxy' user so it owns the stdout/stderr log
    # pipes (Squid 5 refuses to run as root). PID 1 == proxy, no privilege drop.
    user: "proxy"
    networks:
      - egress      # has internet
      - sandbox     # talks to the claude container (internal-only)
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 128
    healthcheck:
      test: ["CMD", "sh", "-c", "squidclient -h 127.0.0.1 mgr:info >/dev/null 2>&1 || nc -z 127.0.0.1 3128"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Claude Code sandbox: NO direct internet. All egress goes through `proxy`.
  # Runs as non-root, no caps, no new privileges, capped RAM/CPU/PIDs.
  # --------------------------------------------------------------------------
  claude:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-sandbox
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - sandbox     # internal-only: cannot reach the internet on its own
    environment:
      # Force every HTTP(S) client (node/claude, git, curl, npm) through Squid.
      HTTP_PROXY: "http://proxy:3128"
      HTTPS_PROXY: "http://proxy:3128"
      http_proxy: "http://proxy:3128"
      https_proxy: "http://proxy:3128"
      NO_PROXY: "localhost,127.0.0.1,proxy"
      no_proxy: "localhost,127.0.0.1,proxy"
      # Keep the egress allow-list minimal: no telemetry / auto-update traffic.
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      # Turing/GTX 1650 training knobs (mirror the project's training image).
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      HF_HOME: "/workspace/.hf_cache"
      # OPTIONAL — only if you want metered API-key billing instead of your
      # Pro/Max subscription. Leave unset to use subscription login (Section 4).
      # Provide it via .env; empty string is passed when unset (ignored).
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - workspace:/workspace                  # named volume, NOT a host bind mount
      # Persist the WHOLE home dir so both ~/.claude/ AND ~/.claude.json (login +
      # folder-trust + project config) survive container rebuilds.
      - claude_config:/home/claude
    working_dir: /workspace
    user: "claude"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false
    # GPU passthrough. Uses the NVIDIA container runtime to expose the GPU to the
    # container WITHOUT host filesystem, root, or docker-socket access. Requires
    # the NVIDIA Container Toolkit on the host (Docker Desktop + WSL2 on Windows).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Limits sized for GTX 1650 training (~15 GB RAM box). The data pipeline needs
    # more than 4 GB RAM, so this is higher than a pure code-editing sandbox.
    # Lower mem_limit/cpus if your machine has less; keep memswap == mem_limit.
    mem_limit: 12g
    memswap_limit: 12g                 # = mem_limit -> no swap, hard RAM cap
    cpus: 4.0
    pids_limit: 2048                   # room for DataLoader workers + torch threads
    # Keep the container alive so you can `exec` into it. Claude is launched
    # manually (see the guide), never as the container's main process.
    command: ["sleep", "infinity"]

networks:
  egress:
    driver: bridge          # normal bridge -> NAT to the internet
  sandbox:
    driver: bridge
    internal: true          # NO route off the host; this is the key control

volumes:
  workspace:                # docker-managed named volume for /workspace
  claude_config:            # persists ~/.claude (your subscription login) across rebuilds
